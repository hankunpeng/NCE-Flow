server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 启用 gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # 静态文件缓存策略
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 音频文件缓存策略
    location ~* \.(mp3|wav|ogg)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # 歌词文件缓存策略
    location ~* \.(lrc)$ {
        expires 30d;
        add_header Cache-Control "public";
        add_header Content-Type "text/plain; charset=utf-8";
    }

    # 用户数据后端（可选）：读写挂载在 /app/data 的 JSON。
    # 纯静态部署下此 location 不存在，前端探测不到特征头即自动回退 localStorage。
    location = /api/userData {
        default_type application/json;
        add_header X-NCE-Storage "1" always;       # 特征头；401 上也带，供前端区分“需令牌”与“无后端”
        add_header Cache-Control "no-store" always;
        client_max_body_size 5m;
        client_body_buffer_size 256k;
        content_by_lua_file /etc/nginx/lua/userdata.lua;
    }

    # SPA 路由支持 - 所有未找到的请求都返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }

    # 安全头部
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
